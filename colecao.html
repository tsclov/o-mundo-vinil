<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coleções</title>
<link rel="icon" href="M V.png" type="image/x-icon">
<style>


@font-face{
  font-family:'Heaven';
  src:url('./JustLikeHeaven_v2.otf') format('opentype');
}


*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:white;
}

/* =========================
   HEADER
========================= */
header{
      width:100%;
      position:fixed;
      top:0;
      left:0;
      z-index:999;
      padding:24px 7%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter:blur(14px);
      background:rgba(0,0,0,0.45);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      font-family:'Heaven';
      font-size:2rem;
      letter-spacing:3px;
      color:#b3b8ff;
    }

    nav{
      display:flex;
      gap:35px;
      align-items:center;
    }

    nav a{
      text-decoration:none;
      color:#ffffff;
      font-size:0.95rem;
      transition:0.3s;
    }

    nav a:hover{
      color:#b3ffb7;
    }

    
/* =========================
   MENU MOBILE
========================= */
.menu-mobile{
  display:none;
  background:none;
  border:none;
  color:white;
  font-size:2rem;
  cursor:pointer;
}

/* =========================
   HERO / CARROSSEL
========================= */
.collections{
  width:100%;
  height:100dvh;
}

.collections-title{
  position:absolute;
  z-index:20;
  left:7%;
  bottom:120px;
  font-family:'Heaven';
  font-size:5rem;
  letter-spacing:5px;
}

.carousel-wrapper{
  position:relative;
  width:100%;
  height:100dvh;
  overflow:hidden;
}

.carousel{
  display:flex;
  transition:0.7s ease;
}

.collection-card{
  width:100vw;
  height:100dvh;
  flex-shrink:0;
  position:relative;
  cursor:pointer;
}

.collection-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:1s;
}

.collection-card:hover img{
  transform:scale(1.03);
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-end;
  padding:60px;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.05)
  );
}

/* =========================
   SETAS
========================= */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,0.45);
  color:white;
  font-size:2rem;
  cursor:pointer;
  z-index:50;
  transition:0.3s;
}

.arrow:hover{
  background:#5560f7;
}

.left-arrow{ left:20px; }
.right-arrow{ right:20px; }



    


/* =========================
   MOBILE
========================= */
 @media(max-width:768px){

      .menu-mobile{
        display:block;
        position:absolute;
        right:7%;
      }

      nav{
        position:absolute;
        top:100%;
        right:0;
        width:100%;
        background:#0a0a0a;
        flex-direction:column;
        align-items:center;
        gap:25px;
        padding:30px 0;
        display:none;
      }

      nav.active{
        display:flex;
      }


      .hero h1{
        font-size:3.5rem;
      }

      .section-title{
        font-size:2.2rem;
      }

      .banner h2{
        font-size:2.5rem;
      }

      .banner{
        padding:50px 25px;
      }

    }
</style>
</head>

<body>

<header>
  <div class="logo">O mundo vinil</div>

  <button class="menu-mobile" onclick="toggleMenu()">☰</button>

  <nav id="navbar">
    <a href="index.html">Home</a>
    <a href="vinis.html">Vinis</a>
    <a href="colecao.html">Coleções</a>
    <a href="#" >Contato</a>
  </nav>
  
</header>

<!-- COLEÇÕES -->
<section class="collections">

  <h1 class="collections-title">Creator's Choice</h1>

  <div class="carousel-wrapper">

    <button class="arrow left-arrow" onclick="moveSlide(-1)">‹</button>
    <button class="arrow right-arrow" onclick="moveSlide(1)">›</button>

    <div class="carousel" id="carousel">

      <a href="vinis.html?categoria=gustavo" class="collection-card">
        <img src="https://i.redd.it/c1czx9wrcxfb1.gif">
        <div class="overlay"></div>
      </a>

      <a href="vinis.html?categoria=rock" class="collection-card">
        <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWJvaWtnbWZzcHJpYm52azFocDJ5cnk2bWRuMHR4Y2NkMXhpZXJndCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/gtIzb2whJJxLV3uwYL/giphy.gif">
        <div class="overlay"></div>
      </a>

      <a href="vinis.html?categoria=indie" class="collection-card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnlmd2dyNWh4Y2hwcTZxZGtxc3M0YmxvanBubHU3Y2I1bmJnd2xkNyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/9C5wJj75dTvFwirIl6/giphy.gif">
        <div class="overlay"></div>
      </a>

      <a href="vinis.html?categoria=kpop" class="collection-card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTViYm5hM3Y3bnBubmVsOW9ndHJxNjQ4ZmUydGN5amh0anplY3NzOSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/6teSBij2OdIJf2tdQG/giphy.gif">
        <div class="overlay"></div>
      </a>

      <a href="vinis.html?categoria=exclusive" class="collection-card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZmtoZHRpamthZThqbW5qbG1rNnlydGp2azkxb2NqOXc0NWoyNmZmZyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/QyyWfILLmEKcT4LoFa/giphy.gif">
        <div class="overlay"></div>
      </a>

    </div>

  </div>
</section>



<script>

let currentIndex = 0;

function moveSlide(direction){

  const carousel = document.getElementById("carousel");
  const cards = document.querySelectorAll(".collection-card");
  const cardWidth = window.innerWidth;

  currentIndex += direction;

  if(currentIndex >= cards.length) currentIndex = 0;
  if(currentIndex < 0) currentIndex = cards.length - 1;

  carousel.style.transform =
    `translateX(-${currentIndex * cardWidth}px)`;
}

/* MENU */
function toggleMenu(){
  document.getElementById("navbar").classList.toggle("active");
}



</script>

</body>
</html>
